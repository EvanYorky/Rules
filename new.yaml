port: 7890
socks-port: 7891
redir-port: 7892
allow-lan: false
mode: rule
log-level: silent
external-controller: '0.0.0.0:9090'
secret: ''
proxy-providers:
  Amytele-US09:
    type: http
    url: "https://gist.githubusercontent.com/EvanYorky/f01922883f8747e80fe5310aa43e1ecc/raw/amytele.yaml"
    interval: 86400
    filter: "(?i)(美国|US|United States).*?09"
    lazy: false
    health-check: {enable: true, interval: 14400, url: http://www.gstatic.com/generate_204}

  Amytele-US:
    type: http
    url: "https://gist.githubusercontent.com/EvanYorky/f01922883f8747e80fe5310aa43e1ecc/raw/amytele.yaml"
    path: ./amytele.yaml
    interval: 86400
    filter: "(?i)(美国|US|United States).*?(0[1-8]|[1-9][0-9])"
    lazy: false
    health-check: {enable: true, interval: 14400, url: http://www.gstatic.com/generate_204}

  Amytele:
    type: http
    url: "https://gist.githubusercontent.com/EvanYorky/f01922883f8747e80fe5310aa43e1ecc/raw/amytele.yaml"
    path: ./amytele.yaml
    interval: 86400
    filter: "(?i)(香港|HK|Hong Kong|台湾|TW|Taiwan|日本|JP|Japan|新加坡|SG|Singapore)"
    lazy: false
    health-check: {enable: true, interval: 14400, url: http://www.gstatic.com/generate_204}

  SSRDOG-US05:
    type: http
    url: "https://gist.githubusercontent.com/EvanYorky/890d6f211f5de338dcf21e91daaf9e12/raw/SSRDOG.yaml"
    path: ./ssrdog.yaml
    interval: 86400
    filter: "(?i)United States.*?05"
    lazy: false
    health-check: {enable: true, interval: 14400, url: http://www.gstatic.com/generate_204}

  SSRDOG-US:
    type: http
    url: "https://gist.githubusercontent.com/EvanYorky/890d6f211f5de338dcf21e91daaf9e12/raw/SSRDOG.yaml"
    path: ./ssrdog.yaml
    interval: 86400
    filter: "(?i)United States.*?(0[1-4])"
    lazy: false
    health-check: {enable: true, interval: 14400, url: http://www.gstatic.com/generate_204}

  SSRDOG:
    type: http
    url: "https://gist.githubusercontent.com/EvanYorky/890d6f211f5de338dcf21e91daaf9e12/raw/SSRDOG.yaml"
    path: ./ssrdog.yaml
    interval: 86400
    filter: "(?i)(Hong Kong|Taiwan|Singapore|Japan).*?0[1-5]"
    lazy: false
    health-check: {enable: true, interval: 14400, url: http://www.gstatic.com/generate_204}    

# 3. XX-AI (无审计)
  XX-AI:
    type: http
    url: "https://gist.githubusercontent.com/EvanYorky/ce1a8b0da4159d940a7e84b4fa7a2370/raw/xxai.yaml"
    path: ./xxai.yaml
    interval: 86400
    filter: "(?i)Hong Kong.*?(0[1-3])"
    lazy: false
    health-check: {enable: true, interval: 14400, url: http://www.gstatic.com/generate_204}

# 五. 规则集合 (Rule Providers)

rule-providers:
  
# 流媒体
  Netflix:
    type: http
    behavior: classical
    interval: 86400
    path: ./ruleset/Netflix.yaml
    url: "https://raw.githubusercontent.com/EvanYorky/Rules/main/Netflix.yaml"

  HBO:
    type: http
    behavior: classical
    interval: 86400
    path: ./ruleset/HBO.yaml
    url: "https://raw.githubusercontent.com/EvanYorky/Rules/main/HBO.yaml"

  DisneyPlus:
    type: http
    behavior: classical
    interval: 86400
    path: ./ruleset/DisneyPlus.yaml
    url: "https://raw.githubusercontent.com/EvanYorky/Rules/main/DisneyPlus.yaml"

  Telegram:
    type: http
    behavior: classical
    interval: 86400
    path: ./ruleset/Telegram.yaml
    url: "https://raw.githubusercontent.com/EvanYorky/Rules/main/Telegram.yaml"

  YouTube:
    type: http
    behavior: classical
    interval: 86400
    path: ./ruleset/YouTube.yaml
    url: "https://raw.githubusercontent.com/EvanYorky/Rules/main/YouTube.yaml"

  # AI
  AI:
    type: http
    behavior: classical
    interval: 86400
    path: ./ruleset/AI.yaml
    url: "https://raw.githubusercontent.com/EvanYorky/Rules/main/AI.yaml"

  # 地区
  HongKong:
    type: http
    behavior: classical
    interval: 86400
    path: ./ruleset/HongKong.yaml
    url: "https://raw.githubusercontent.com/EvanYorky/Rules/main/HongKong.yaml"

  Taiwan:
    type: http
    behavior: classical
    interval: 86400
    path: ./ruleset/Taiwan.yaml
    url: "https://raw.githubusercontent.com/EvanYorky/Rules/main/Taiwan.yaml"

  Japan:
    type: http
    behavior: classical
    interval: 86400
    path: ./ruleset/Japan.yaml
    url: "https://raw.githubusercontent.com/EvanYorky/Rules/main/Japan.yaml"

  # 系统
  Google:
    type: http
    behavior: classical
    interval: 86400
    path: ./ruleset/Google.yaml
    url: "https://raw.githubusercontent.com/EvanYorky/Rules/main/Google.yaml"

  Apple:
    type: http
    behavior: classical
    interval: 86400
    path: ./ruleset/Apple.yaml
    url: "https://raw.githubusercontent.com/EvanYorky/Rules/main/Apple.yaml"

  Microsoft:
    type: http
    behavior: classical
    interval: 86400
    path: ./ruleset/Microsoft.yaml
    url: "https://raw.githubusercontent.com/EvanYorky/Rules/main/Microsoft.yaml"

  # 其他
  WholeLine:
    type: http
    behavior: classical
    interval: 86400
    path: ./ruleset/WholeLine.yaml
    url: "https://raw.githubusercontent.com/EvanYorky/Rules/main/WholeLine.yaml"

  Proxies:
    type: http
    behavior: classical
    interval: 86400
    path: ./ruleset/Proxies.yaml
    url: "https://raw.githubusercontent.com/EvanYorky/Rules/main/Proxies.yaml"

  Direct:
    type: http
    behavior: classical
    interval: 86400
    path: ./ruleset/Direct.yaml
    url: "https://raw.githubusercontent.com/EvanYorky/Rules/main/Direct.yaml"

# 六. 策略组 (Proxy Groups)

proxy-groups:
  # 1. 主代理
  - name: Proxies
    icon: https://raw.githubusercontent.com/EvanYorky/icon/main/Proxy.png
    type: fallback
    url: http://www.gstatic.com/generate_204
    interval: 14400
    max-failed-times: 3
    lazy: false
    use:
      - Amytele-US09
      - Amytele-US
      - SSRDOG-US05
      - SSRDOG-US      
      - Amytele
      - SSRDOG

  # 2. 流媒体
  - name: Netflix
    icon: https://raw.githubusercontent.com/EvanYorky/icon/main/Netflix.png
    type: select
    proxies:
      - Singapore
      - HongKong
      - Taiwan

  - name: HBO
    icon: https://raw.githubusercontent.com/EvanYorky/icon/main/HBOMax.png
    type: select
    proxies:
      - Singapore
      - HongKong
      - United States
      - Taiwan

  - name: DisneyPlus
    icon: https://raw.githubusercontent.com/EvanYorky/icon/main/DisneyPlus.png
    type: select
    proxies:
      - Taiwan
      - Singapore
      - HongKong

  - name: Telegram
    icon: https://raw.githubusercontent.com/EvanYorky/icon/main/Telegram.png
    type: select
    proxies:
      - HongKong
      - Taiwan
      - Singapore

  - name: YouTube
    icon: https://raw.githubusercontent.com/EvanYorky/icon/main/yt.png
    type: select
    proxies:
      - United States
      - Singapore
      - HongKong
      - Taiwan

  # 3. AI
  - name: AI
    icon: https://raw.githubusercontent.com/EvanYorky/icon/main/ai.png
    type: select
    proxies:
      - United States
      - Singapore
      - Taiwan

  # 4. 地区
  - name: HongKong
    icon: https://raw.githubusercontent.com/EvanYorky/icon/main/hk.png
    type: fallback
    url: http://www.gstatic.com/generate_204
    interval: 14400
    max-failed-times: 3
    lazy: false
    use:
      - Amytele
      - SSRDOG
    filter: "(?i)香港|HK|Hong Kong"

  - name: Singapore
    icon: https://raw.githubusercontent.com/EvanYorky/icon/main/sg.png
    type: fallback
    url: http://www.gstatic.com/generate_204
    interval: 14400
    max-failed-times: 3
    lazy: false
    use:
      - Amytele
      - SSRDOG
    filter: "(?i)新加坡|SG|Singapore"

  - name: Taiwan
    icon: https://raw.githubusercontent.com/EvanYorky/icon/main/tw.png
    type: fallback
    url: http://www.gstatic.com/generate_204
    interval: 14400
    max-failed-times: 3
    lazy: false
    use:
      - Amytele
      - SSRDOG
    filter: "(?i)台湾|TW|Taiwan"

  - name: Japan
    icon: https://raw.githubusercontent.com/EvanYorky/icon/main/jp.png
    type: fallback
    url: http://www.gstatic.com/generate_204
    interval: 14400
    max-failed-times: 3
    lazy: false
    use:
      - Amytele
      - SSRDOG
    filter: "(?i)日本|JP|Japan"

  - name: United States
    icon: https://raw.githubusercontent.com/EvanYorky/icon/main/us.png
    type: fallback
    url: http://www.gstatic.com/generate_204
    interval: 14400
    max-failed-times: 3
    lazy: false
    use:
      - Amytele-US09
      - Amytele-US
      - SSRDOG-US05
      - SSRDOG-US
    filter: "(?i)美国|US|United States"

  # 5. 系统和服务
  - name: Google
    icon: https://raw.githubusercontent.com/EvanYorky/icon/main/google.png
    type: select
    proxies:
      - Proxies
      - Singapore
      - HongKong
      - Taiwan

  - name: Apple
    icon: https://raw.githubusercontent.com/EvanYorky/icon/main/Apple.png
    type: select
    proxies:
      - 🎯Direct
      - Proxies

  - name: Microsoft
    icon: https://raw.githubusercontent.com/EvanYorky/icon/main/Microsoft.png
    type: select
    proxies:
      - 🎯Direct
      - Proxies

  # 6. 特殊
  - name: WholeLine
    icon: https://raw.githubusercontent.com/EvanYorky/icon/main/wl.png
    type: fallback
    url: http://www.gstatic.com/generate_204
    interval: 14400
    max-failed-times: 3
    lazy: false
    use:
      - XX-AI

  # 7. 兜底
  - name: 🎯Direct
    icon: https://raw.githubusercontent.com/EvanYorky/icon/main/Direct.png
    type: select
    proxies:
      - DIRECT
      - Proxies

  - name: ✈️Final
    icon: https://raw.githubusercontent.com/EvanYorky/icon/main/Final.png
    type: select
    proxies:
      - Proxies
      - 🎯Direct

# 七. 规则 (Rules)

rules:
# Windows端软件
  - PROCESS-NAME,Weixin.exe,🎯Direct
  - PROCESS-NAME,WeChat.exe,🎯Direct
  - PROCESS-NAME,Telegram.exe,Telegram
  - PROCESS-NAME,telegram-desktop,Telegram
  - PROCESS-NAME,Telegram,Telegram
  - PROCESS-NAME,GoogleDriveFS.exe,Google
  - PROCESS-NAME,BackupandSync,Google
  
# Android端软件
  - PROCESS-NAME,com.netflix.ninja,Netflix
  - PROCESS-NAME,com.netflix.mediaclient,Netflix
  - PROCESS-NAME,com.wbd.stream,HBO
  - PROCESS-NAME,com.hbo.hbonow,HBO
  - PROCESS-NAME,com.disney.disneyplus,DisneyPlus
  - PROCESS-NAME,com.disney.datg.videoplatforms.android.abc,DisneyPlus
